<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body {
            background-color: lightblue;
            display: flex;
            align-items: center;
        }
        .all{
            width: 950px;
            height: 500px;
            display: flex;
            flex-wrap: wrap;
            margin-left:270px;
        }
        .card {
            width: 140px;
            height: 185px;
            background-image: url("card.jpeg");
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            border: 2.5px solid #A4987E;
            margin: 15px;
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }
        .po {
            background:white ;
            padding: 20px;
            width: 300px;
            margin: 15% auto;
            border-radius: 8px;
            background-color: darkblue;
        }
        .overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #4285F4;
            z-index: 10;
        }
    </style>
</head>
<body>
    <div class="t">Timer:<span id="sec">0</span></div>
        <h1>Flipping Cards</h1>
        <div class="all">
        <div class="card" id="1"></div>
        <div class="card" id="2"></div>
        <div class="card" id="3"></div>
        <div class="card" id="4"></div>
        <div class="card" id="5"></div>
        <div class="card" id="6"></div>
        <div class="card" id="7"></div>
        <div class="card" id="8"></div>
        <div class="card" id="9"></div>
        <div class="card" id="10"></div>
        <div class="card" id="11"></div>
        <div class="card" id="12"></div>
        <div class="card" id="13"></div>
        <div class="card" id="14"></div>
        </div>
        <div id="po" class="overlay">
            <div class="pop-text">
                <h1>You have done it...!</h1>
                <p id="time"></p>
                    <button id="again">Try Again...</button>
                </div>
        </div>
        
    
</body>
</html>
