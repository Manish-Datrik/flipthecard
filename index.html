<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>Flipping Cards</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            background-color: #eef2f7;
            color: #243b55;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .wrapper {
            background: white;
            border-radius: 16px;
            padding: 36px 32px;
            max-width: 520px;
            width: 100%;
            text-align: center;
        }
        h1 {
            font-size: 2.4rem;
            margin-bottom: 16px;
            text-decoration: underline;
            letter-spacing: 0.02em;
        }
        p {
            font-size: 1rem;
            line-height: 1.6;
            margin-bottom: 18px;
            color: #4a5568;
        }
        .btn-play {
            display: inline-block;
            background-color: #2b6cb0;
            color: white;
            border: none;
            border-radius: 10px;
            padding: 12px 24px;
            font-size: 1rem;
            cursor: pointer;
            transition: background-color 0.2s ease;
            text-transform: uppercase;
            letter-spacing: 0.04em;
        }
        .btn-play:hover {
            background-color: #2c5282;
        }
    </style>
</head>
<body>
    <div class="wrapper">
        <h1>Flipping Cards</h1>
        <p>Test your memory by finding the matching cards. Flip two cards at a time and remember their positions.</p>
        <p>Use your brain, stay focused, and match all pairs correctly.</p>
        <button type="button" class="btn-play" id="play" onclick="window.location.href='singlep.html'">Play</button>
        <button type="button" class="btn-play1" id="play" onclick="window.location.href='multiplayer.html'">Play</button>
    </div>
</body>
</html>
