<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flipping Cards</title>
    <style>
        body {
            padding-top: 40px;
            padding-left: 45px;
            background-color: lightgreen;
        }

        .all {
            width: 950px;
            height: 500px;
            display:flex;
            flex-wrap: wrap;
            margin-left: 270;
            margin-top: -80;
        }
        .card {
            width:140px;
            height: 185;
            background-image: url(card.jpeg);
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            border: 2.5px solid lightpink;
            margin: 15px;
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }
        .overlay{
            display: none;
            position: fixed;
            top:0; left:0;
            width: 100%; height: 100%;
            background: indianred;
        }
    </style>
</head>
<body>
    <h1 style="margin-bottom: 0px; ;margin-top: -30px;margin-left: 650px;">Flipping Cards</h1>
    <p id="pa" style="width: 75px;padding-left :2px;">First Player</p>
    <p id="pb" style="width: 75px;padding-left: 2px;">Second Player</p>
    <div class="all">
        <div class="card" id="1"></div>
        <div class="card" id="2"></div>
        <div class="card" id="3"></div>
        <div class="card" id="4"></div>
        <div class="card" id="5"></div>
        <div class="card" id="6"></div>
        <div class="card" id="7"></div>
        <div class="card" id="8"></div>
        <div class="card" id="9"></div>
        <div class="card" id="10"></div>
        <div class="card" id="11"></div>
        <div class="card" id="12"></div>
        <div class="card" id="13"></div>
        <div class="card" id="14"></div>
    </div>
    <div class="overlay" id="po">
        <div class="content">
            <h2>You have done it...</h2>
            <h4 id="pops"></h4>
            <button style="margin-left: 5px;margin-top: 10px;background-color: #F0ECCB;border:2.5px solid #A4987E;height:30px;width:70px;" class="btn" onclick="window.location.reload()">Rematch</button>
        </div>
    </div>
    <script>
        let a = [], pairs = [], turns = [], i = 1, p1 = 0, p2 = 0, curr = 'A', currs = 0;
        let pops = document.getElementById("pops");
        let playera = document.getElementById("pa");
        let playerb = document.getElementById("pb");

        let cardImageNumbers = [];
        for (let j = 1; j <= 7; j++) {
            cardImageNumbers.push(j, j);
        }
        function shuffle(arr) {
            for (let k = arr.length - 1; k > 0; k--) {
                let m = Math.floor(Math.random() * (k + 1));
                [arr[k], arr[m]] = [arr[m], arr[k]];
            }
            return arr;
        }
        cardImageNumbers = shuffle(cardImageNumbers);

        for (let idx = 0; idx < 14; idx++) {
            a[idx] = [];
            a[idx][0] = idx + 1;
            a[idx][1] = cardImageNumbers[idx];
        }

        let a1 = document.querySelectorAll(".card");
        a1.forEach((all)=>{
            all.addEventListener("click",function (){
                let aa=Number(all.getAttribute("id"));
                if (curr === 'A' && currs === 2) {
                    curr = 'B';
                    currs = 1;
                } else if (curr === 'B' && currs === 2) {
                    curr = 'A';
                    currs = 1;
                } else {
                    currs++;
                }
                if (curr === 'A') {
                    playera.style.border = "2.5px solid #A4987E";
                    playerb.style.border = "none";
                } else if (curr === 'B') {
                    playerb.style.border = "2.5px solid #A4987E";
                    playera.style.border = "none";
                }

                if (!pairs.includes(aa) && i == 1 && aa !== turns[0]) {
                    turns.push(aa);
                    let ac = all;
                    let ad = a[aa-1][1] + '.jpg';
                    ac.style.backgroundImage = `url("${ad}")`;
                    verify();
                }
            })})
        
        function verify() {
            if (turns.length === 2) {
                if (a[turns[0]-1][1] == a[turns[1]-1][1]) {
                    pairs.push(turns[0]);
                    pairs.push(turns[1]);
                    if (curr === 'A') {
                        p1++;
                        playera.innerText = 'Player A: ' + p1;
                    } else {
                        p2++;
                        playerb.innerText = 'Player B: ' + p2;
                    }
                } else {
                    let a1 = document.getElementById(String(turns[0]));
                    let a2 = document.getElementById(String(turns[1]));
                    i = 0;
                    setTimeout(function () {
                        a1.style.backgroundImage = 'url("card.jpeg")';
                        a2.style.backgroundImage = 'url("card.jpeg")';
                        i = 1;
                    }, 600);
                }
                turns.pop();
                turns.pop();
                if (pairs.length === 14) {
                    const overlay = document.getElementById('po');
                    overlay.style.display = 'block';
                    if (p1 > p2) {
                        pops.innerHTML = 'Player A has won!<br>Do you want a rematch Player B';
                    } else if (p2 > p1) {
                        pops.innerHTML = 'Player B has won!<br>Do you want a rematch Player A';
                    } else {
                        pops.innerHTML = 'Both players are tied up!<br>Do you guys want a rematch';
                    }
                }
            }
        }
    </script>
</body>
</html>
